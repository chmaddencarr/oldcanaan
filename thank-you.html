<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Old Canaan Building Materials</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    :root{--paper:#F2EDE4;--ink:#1A1814;--mid:#6B6458;--faint:#A89F94;--rule:#C8BFB0;--copper:#7A5C3C;--font-display:'Playfair Display',Georgia,serif;--font-body:'EB Garamond',Georgia,serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{background:var(--paper);color:var(--ink);font-family:var(--font-body);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .mark{font-family:var(--font-display);font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:1.5rem;}
    .rule{width:2.5rem;height:2px;background:var(--copper);margin:0 auto 2rem;}
    h1{font-family:var(--font-display);font-size:clamp(1.6rem,3vw,2.4rem);font-weight:500;letter-spacing:0.03em;color:var(--ink);margin-bottom:1rem;line-height:1.2;}
    p{font-family:var(--font-body);font-size:1.05rem;color:var(--mid);font-style:italic;margin-bottom:2rem;line-height:1.7;max-width:440px;}
    .back{font-family:var(--font-display);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--copper);border-bottom:1px solid var(--copper);padding-bottom:2px;transition:color 0.2s,border-color 0.2s;}
    .back:hover{color:var(--ink);border-color:var(--ink);}
  </style>
</head>
<body>
  <span class="mark">Old Canaan Building Materials</span>
  <div class="rule"></div>
  <h1>You are on the list.</h1>
  <p>When we identify something worth knowing, we will send it. No frequency. No filler.</p>
  <a href="/" class="back">Return to the Archive</a>
</body>
</html>
